<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0e0c0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="TA">
<title>Terminal Analyzer</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@1,9..144,400;1,9..144,500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg0:#0e0c0a; --bg1:#14110d; --bg2:#1a1612;
    --brd:#2e2620; --brdhi:#4a3d2f;
    --t0:#f3e6cf; --t1:#c9b89a; --t2:#87765c; --t3:#5a4d3a;
    --amb:#ffaa33; --ambD:#cc7a1f;
    --bull:#6fbd80; --bear:#d96565;
    --nav-h: 56px;
    --safe-b: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg0); color: var(--t0);
    font-family: 'IBM Plex Mono', monospace;
    height: 100%; overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── SPLASH ─────────────────────────────────────────────── */
  #splash {
    position: fixed; inset: 0; background: var(--bg0);
    display: flex; flex-direction: column;
    justify-content: center; align-items: flex-start;
    padding: 40px 32px;
    z-index: 9999;
    transition: opacity .5s ease;
  }
  #splash.fade { opacity: 0; pointer-events: none; }
  #splash-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px; color: var(--amb);
    line-height: 1.7; white-space: pre;
  }

  /* ── SHELL ──────────────────────────────────────────────── */
  #shell {
    display: flex; flex-direction: column;
    height: 100%; height: 100dvh;
  }

  /* ── FRAMES ─────────────────────────────────────────────── */
  #frames {
    flex: 1; position: relative; overflow: hidden;
  }
  .frame {
    position: absolute; inset: 0;
    border: none; width: 100%; height: 100%;
    background: var(--bg0);
    transition: opacity .25s ease, transform .25s ease;
  }
  .frame.hidden {
    opacity: 0; pointer-events: none;
    transform: translateY(6px);
  }

  /* ── BOTTOM NAV ─────────────────────────────────────────── */
  #nav {
    background: var(--bg1);
    border-top: 1px solid var(--brd);
    display: flex;
    height: calc(var(--nav-h) + var(--safe-b));
    padding-bottom: var(--safe-b);
    flex-shrink: 0;
    box-shadow: 0 -4px 24px rgba(0,0,0,.5);
  }

  .nav-btn {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 4px;
    background: none; border: none; cursor: pointer;
    color: var(--t3); transition: color .15s ease;
    padding: 8px 0; position: relative;
  }
  .nav-btn:active { background: rgba(255,170,51,.06); }
  .nav-btn.active { color: var(--amb); }
  .nav-btn.active::after {
    content: ""; position: absolute;
    top: 0; left: 20%; right: 20%; height: 2px;
    background: var(--amb);
    box-shadow: 0 0 8px var(--amb);
  }

  .nav-icon {
    width: 22px; height: 22px;
  }
  .nav-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px; font-weight: 600;
    letter-spacing: .15em; text-transform: uppercase;
  }

  /* ── LOADING BAR ────────────────────────────────────────── */
  #load-bar {
    position: fixed; top: 0; left: 0; right: 0; height: 2px;
    background: var(--amb);
    transform-origin: left;
    transform: scaleX(0);
    transition: transform .3s ease;
    z-index: 1000;
  }
  #load-bar.show { transform: scaleX(.7); }
  #load-bar.done { transform: scaleX(1); opacity: 0; transition: transform .1s, opacity .3s .1s; }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div id="splash-text"></div>
</div>

<!-- LOADING BAR -->
<div id="load-bar"></div>

<!-- SHELL -->
<div id="shell">
  <div id="frames">
    <iframe id="frame-intraday" class="frame"        src="intraday.html"  title="Intraday Analyzer"></iframe>
    <iframe id="frame-swing"    class="frame hidden" src="swing.html"     title="Swing Analyzer"></iframe>
  </div>

  <nav id="nav">
    <button class="nav-btn active" id="btn-intraday" onclick="switchTab('intraday')">
      <!-- candlestick / intraday icon -->
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="4" y1="18" x2="20" y2="18"/>
        <polyline points="4,13 8,9 12,12 16,6 20,9"/>
        <circle cx="20" cy="9" r="1.5" fill="currentColor" stroke="none"/>
      </svg>
      <span class="nav-label">Intraday</span>
    </button>

    <button class="nav-btn" id="btn-swing" onclick="switchTab('swing')">
      <!-- bar chart / swing icon -->
      <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
        <rect x="3"  y="10" width="3.5" height="9" rx=".5"/>
        <rect x="3"  y="7"  width="3.5" height="2" rx=".5" opacity=".5"/>
        <rect x="10" y="6"  width="3.5" height="13" rx=".5"/>
        <rect x="10" y="3"  width="3.5" height="2"  rx=".5" opacity=".5"/>
        <rect x="17" y="12" width="3.5" height="7"  rx=".5"/>
        <rect x="17" y="9"  width="3.5" height="2"  rx=".5" opacity=".5"/>
      </svg>
      <span class="nav-label">Swing</span>
    </button>
  </nav>
</div>

<script>
/* ── SPLASH BOOT SEQUENCE ─────────────────────────────────────── */
const bootLines = [
  "TERMINAL ANALYZER  v1.0",
  "────────────────────────────────",
  "Loading indicator engine ...",
  "Linking Yahoo Finance API ...",
  "Preparing pivot calculators ...",
  "Supertrend / VWAP / ADX ready",
  "Fundamental scorer loaded ...",
  "────────────────────────────────",
  "SYSTEM READY  ▓▓▓▓▓▓▓▓▓▓  100%",
];

let lineIdx = 0;
let rendered = "";
const splashEl = document.getElementById("splash-text");

function typeLine() {
  if (lineIdx >= bootLines.size) { endSplash(); return; }
  if (lineIdx >= bootLines.length) { endSplash(); return; }
  const line = bootLines[lineIdx];
  lineIdx++;
  let ci = 0;
  const delay = lineIdx === 1 ? 40 : 20;
  function typeChar() {
    if (ci <= line.length) {
      splashEl.textContent = rendered + line.slice(0, ci) + (ci < line.length ? "█" : "");
      ci++;
      setTimeout(typeChar, delay);
    } else {
      rendered += (rendered ? "\n" : "") + line;
      splashEl.textContent = rendered;
      setTimeout(typeLine, lineIdx >= bootLines.length ? 300 : 100);
    }
  }
  typeChar();
}

function endSplash() {
  const s = document.getElementById("splash");
  s.classList.add("fade");
  setTimeout(() => s.remove(), 600);
}

typeLine();

/* ── TAB SWITCHING ────────────────────────────────────────────── */
let activeTab = "intraday";

function switchTab(tab) {
  if (tab === activeTab) return;
  activeTab = tab;

  document.getElementById("frame-intraday").classList.toggle("hidden", tab !== "intraday");
  document.getElementById("frame-swing").classList.toggle("hidden",    tab !== "swing");
  document.getElementById("btn-intraday").classList.toggle("active",   tab === "intraday");
  document.getElementById("btn-swing").classList.toggle("active",      tab === "swing");

  // Brief loading bar flash on tab switch
  const bar = document.getElementById("load-bar");
  bar.classList.remove("done");
  bar.classList.add("show");
  setTimeout(() => { bar.classList.add("done"); setTimeout(() => bar.classList.remove("show","done"), 400); }, 400);
}

/* ── SERVICE WORKER ───────────────────────────────────────────── */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}
</script>
</body>
</html>
